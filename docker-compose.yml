version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: quantis_db
    environment:
      POSTGRES_USER: quantis
      POSTGRES_PASSWORD: quantis_pass_2024
      POSTGRES_DB: quantis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantis"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: quantis_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@quantis.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data: